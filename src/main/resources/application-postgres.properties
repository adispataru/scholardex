# H22.2 Postgres/Flyway profile configuration.
# This profile is opt-in and does not affect the default Mongo-backed runtime mode.

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/core}
spring.datasource.username=${POSTGRES_USER:core}
spring.datasource.password=${POSTGRES_PASSWORD:core}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.schemas=reporting_read
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=reporting_read

# H22.3 projector flags
core.h22.projection.enabled=${H22_PROJECTION_ENABLED:false}
core.h22.projection.chunk-size=${H22_PROJECTION_CHUNK_SIZE:1000}
core.h22.projection.statement-timeout-ms=${H22_PROJECTION_STATEMENT_TIMEOUT_MS:120000}
core.h22.projection.dry-run=${H22_PROJECTION_DRY_RUN:false}
core.h22.projection.wos-fingerprint-fields=${H22_PROJECTION_WOS_FINGERPRINT_FIELDS:count,max(updatedAt),max(createdAt),max(sourceVersion)}
core.h22.projection.scopus-fingerprint-fields=${H22_PROJECTION_SCOPUS_FINGERPRINT_FIELDS:count,max(updatedAt),max(buildAt),max(createdAt)}

# H22.4 read-store selector (mongo by default, postgres for big-bang cutover).
app.reporting.read-store=${APP_REPORTING_READ_STORE:mongo}

# H22.6 dual-read gate
core.h22.dual-read-gate.sample-size=${H22_DUAL_READ_GATE_SAMPLE_SIZE:5}
core.h22.dual-read-gate.p95-ratio-threshold=${H22_DUAL_READ_GATE_P95_RATIO_THRESHOLD:1.2}
