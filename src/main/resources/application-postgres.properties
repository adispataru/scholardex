# H22.2 Postgres/Flyway profile configuration.
# Post-cutover runtime for migrated H22 read surfaces is Postgres-first.

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/core}
spring.datasource.username=${POSTGRES_USER:core}
spring.datasource.password=${POSTGRES_PASSWORD:core}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.schemas=reporting_read
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=reporting_read

# H22.3 projector flags
core.h22.projection.enabled=${H22_PROJECTION_ENABLED:false}
core.h22.projection.chunk-size=${H22_PROJECTION_CHUNK_SIZE:1000}
core.h22.projection.statement-timeout-ms=${H22_PROJECTION_STATEMENT_TIMEOUT_MS:120000}

# H22.6 dual-read gate
core.h22.dual-read-gate.sample-size=${H22_DUAL_READ_GATE_SAMPLE_SIZE:5}
core.h22.dual-read-gate.p95-ratio-threshold=${H22_DUAL_READ_GATE_P95_RATIO_THRESHOLD:0.8}
core.h22.dual-read-gate.wos-issn-warmup-enabled=${H22_DUAL_READ_GATE_WOS_ISSN_WARMUP_ENABLED:true}
core.h22.dual-read-gate.group-report-refresh-enabled=${H22_DUAL_READ_GATE_GROUP_REPORT_REFRESH_ENABLED:false}
core.h22.dual-read-gate.group-report-refresh-p95-threshold-ms=${H22_DUAL_READ_GATE_GROUP_REPORT_REFRESH_P95_THRESHOLD_MS:2200}
