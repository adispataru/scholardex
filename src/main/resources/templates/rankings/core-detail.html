<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${conf.acronym}">Conference Ranking</title>
    <th:block th:replace="fragments :: core-styles"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .card-spacing {
            margin-bottom: 20px;
        }
    </style>
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: user-sidebar('rankings-core')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800" th:text="${conf.name}"></h1>

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Description</h6>
                    </div>
                    <div class="card-body">
                        <p>
                            <span>Source: </span>
                            <span th:text="${conf.source}">Source</span>
                        </p>
                        <p>
                            <span>Source ID: </span>
                            <span th:text="${conf.sourceId}">Source ID</span>
                        </p>
                        <p>
                            <span>Acronym: </span>
                            <span th:text="${conf.acronym}">Acronym</span>
                        </p>
                    </div>
                </div>

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Rankings Over the Years</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-area">
                            <canvas id="rankingChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>
<th:block th:replace="fragments :: core-scripts"></th:block>

<script src="/js/demo/datatables-demo.js"></script>
<script th:inline="javascript">
    // Define the years to iterate through
    var years =  [2008, 2010, 2013, 2014, 2017, 2018, 2020, 2021, 2023];

    // Get the data from the server-side model
    var yearlyRankings = /*[[${conf.yearlyRankings}]]*/ '{}';

    // Rank mapping
    var rankMapping = {
        "A_STAR": 5,
        "A": 4,
        "B": 3,
        "C": 2,
        "D": 1,
        "NON_RANK": 0
    };

    // Reverse mapping for y-axis labels
    var reverseRankMapping = {
        5: "A_STAR",
        4: "A",
        3: "B",
        2: "C",
        1: "D",
        0: "NON_RANK"
    };

    // Process the data for Chart.js
    var labels = years;
    var rankData = labels.map(year => {
        if (yearlyRankings[year]) {
            return rankMapping[yearlyRankings[year].rank] || 0; // Map rank to numerical value or 0 if not found
        }
        return null;
    });

    var ctx = document.getElementById('rankingChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Rank',
                data: rankData,
                backgroundColor: "rgba(28, 200, 138, 0.05)",
                borderColor: "rgba(28, 200, 138, 1)",
                pointRadius: 3,
                pointBackgroundColor: "rgba(28, 200, 138, 1)",
                pointBorderColor: "rgba(28, 200, 138, 1)",
                pointHoverRadius: 3,
                pointHoverBackgroundColor: "rgba(28, 200, 138, 1)",
                pointHoverBorderColor: "rgba(28, 200, 138, 1)",
                pointHitRadius: 10,
                pointBorderWidth: 2
            }]
        },
        options: {
            maintainAspectRatio: false,
            layout: {
                padding: {
                    left: 10,
                    right: 25,
                    top: 25,
                    bottom: 0
                }
            },
            scales: {
                xAxes: [{
                    time: {
                        unit: 'year'
                    },
                    gridLines: {
                        display: false,
                        drawBorder: false
                    },
                    ticks: {
                        maxTicksLimit: labels.length
                    }
                }],
                yAxes: [{
                    ticks: {
                        callback: function(value) {
                            return reverseRankMapping[value]; // Use the reverse rank mapping for labels
                        },
                        max: 5,
                        min: 0,
                        stepSize: 1,
                        padding: 10
                    },
                    gridLines: {
                        color: "rgb(234, 236, 244)",
                        zeroLineColor: "rgb(234, 236, 244)",
                        drawBorder: false,
                        borderDash: [2],
                        zeroLineBorderDash: [2]
                    }
                }]
            },
            legend: {
                display: true
            },
            tooltips: {
                backgroundColor: "rgb(255,255,255)",
                bodyFontColor: "#858796",
                titleMarginBottom: 10,
                titleFontColor: '#6e707e',
                titleFontSize: 14,
                borderColor: '#dddfeb',
                borderWidth: 1,
                xPadding: 15,
                yPadding: 15,
                displayColors: false,
                intersect: false,
                mode: 'index',
                caretPadding: 10,
                callbacks: {
                    label: function(tooltipItem, chart) {
                        var datasetLabel = chart.datasets[tooltipItem.datasetIndex].label || '';
                        return datasetLabel + ': ' + reverseRankMapping[tooltipItem.yLabel]; // Show rank label in tooltip
                    }
                }
            }
        }
    });
</script>

</body>
</html>
