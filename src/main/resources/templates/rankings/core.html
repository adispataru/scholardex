<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rankings</title>
    <th:block th:replace="fragments :: core-styles"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: user-sidebar('rankings-core')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Core Rankings</h1>
                <p class="mb-4">This page displays the rankings of conferences.</p>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Filters</h6>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group col-md-5">
                                <label for="core-search">Search</label>
                                <input id="core-search" type="text" class="form-control" placeholder="Conference, acronym, source ID">
                            </div>
                            <div class="form-group col-md-2">
                                <label for="core-sort">Sort By</label>
                                <select id="core-sort" class="form-control">
                                    <option value="name">Conference</option>
                                    <option value="acronym">Acronym</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="core-direction">Direction</label>
                                <select id="core-direction" class="form-control">
                                    <option value="asc">Ascending</option>
                                    <option value="desc">Descending</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="core-size">Page Size</label>
                                <select id="core-size" class="form-control">
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Conference Rankings</h6>
                        <span id="core-total-info" class="text-muted small"></span>
                    </div>
                    <div class="card-body">
                        <div id="core-loading" class="alert alert-info" role="status">Loading rankings...</div>
                        <div id="core-error" class="alert alert-danger d-none" role="alert"></div>
                        <div id="core-empty" class="alert alert-warning d-none" role="status">No rankings found for the current filter.</div>

                        <div class="table-responsive">
                            <table class="table table-bordered" id="core-table" data-detail-base="/rankings/core" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Conference</th>
                                    <th>Acronym</th>
                                    <th>Category 2023</th>
                                </tr>
                                </thead>
                                <tbody id="core-table-body"></tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button id="core-prev" class="btn btn-outline-primary btn-sm" type="button">Previous</button>
                            <span id="core-page-info" class="text-muted small"></span>
                            <button id="core-next" class="btn btn-outline-primary btn-sm" type="button">Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>
<th:block th:replace="fragments :: core-scripts"></th:block>
<script src="/js/rankings-core.js"></script>

</body>
</html>
