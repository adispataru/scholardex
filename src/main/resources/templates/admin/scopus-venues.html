<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forums</title>
    <link href="/assets/app.css" rel="stylesheet" type="text/css">
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('scopus-venues')"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="fragments :: navbar"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <h1 class="h3 mb-2 text-gray-800">Forums</h1>
                <!-- Export button -->
                <button id="exportButton" class="btn btn-primary d-none d-sm-inline-block">Export to Excel</button>
                <p class="mb-4">This is a list of all Forums currently managed by the system.</p>

                <!-- DataTales Example -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Detailed View of Forums</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Publication Name</th>
<!--                                    <th>Cover Date</th>-->
                                    <th>ISSN</th>
                                    <th>eISSN</th>
                                    <th>Aggregation Type</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="forum : ${venues}">
                                    <td><a th:href="@{/admin/scopus/venues/edit/{id}(id=${forum.id})}" th:text="${forum.publicationName}">Publication Name</a></td>
<!--                                    <td th:text="${forum.coverDate}"></td>-->
                                    <td>
                                        <span th:if="${!'null-'.equals(forum.issn)}" th:text="${forum.issn}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${!'null-'.equals(forum.eIssn)}" th:text="${forum.eIssn}"></span>
                                    </td>
                                    <td th:text="${forum.aggregationType}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<script src="/assets/app.js"></script>

<!-- Core plugin JavaScript-->

<!-- Custom scripts for all pages-->
<script src="/js/sb-admin-2.min.js"></script>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

<!-- Script for handling export button click -->
<script>
    document.getElementById("exportButton").addEventListener("click", function() {
        window.location.href = "/api/export";
    });
</script>

</body>
</html>
