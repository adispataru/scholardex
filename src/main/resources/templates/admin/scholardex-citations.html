<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publications</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: admin-sidebar('scholardex-publications')}"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="~{fragments :: navbar}"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Publications</h1>
<!--                    <p class="mb-4">List of your publications scraped from different sources.</p>-->
                    <!--                    <a href="#" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm"><i-->
                    <!--                            class="fa-solid fa-download fa-sm text-white-50"></i> Generate Report</a>-->
<!--                    <button type="button" class="btn btn-primary d-sm-inline-block" data-toggle="modal" data-target="#createUserModal">-->
<!--                        New User-->
<!--                    </button>-->
                </div>
<!--                <h1 class="h3 mb-2 text-gray-800"></h1>-->


                <!-- Trigger Scrape Button and display scrape result -->

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${publication.title}"></h6>
                    </div>
                    <div class="card-body">
<!--                        <div class="row">-->
<!--                            <span th:each="author, stat : ${publication.authorList}">-->
<!--                                <span th:text="${author} + ${!stat.last ? ', ' : ''}"></span>-->
<!--                                <span th:if="${!stat.last}"></span>-->
<!--                                -->
<!--                            </span>-->
                            <p>
                                <div th:each="author, iterStat : ${publication.authors}">

                                <a th:if="${authorMap[author]!=null}" th:text="${authorMap[author].name} + (iterStat.last ? '; ' : '')" th:href="@{/user/authors/view/{id}(id=${author})}">
                                    <span>;</span>
                                </a>
                                </div>
                            </p>
<!--                        </div>-->
<!--                        <div class="row">-->
                            <p th:text="${publication.subtypeDescription}"></p>
<!--                        </div>-->
<!--                        <div class="row">-->

                            <div th:if="${forum != null}">
                            <p>
                                <span th:text="${forum.publicationName}"></span>,
                                <span th:text="${publication.volume}"></span>,
                                <span th:text="${publication.issueIdentifier}"></span>,
                                <span th:if="${!forum.issn.equals('null-')}" th:text="${forum.issn}"></span>
                            </p>
                            </div>
<!--                        </div>-->
                    </div>
                </div>
                <!-- DataTales Example -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Citations</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered js-datatable" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Year</th>
                                    <th>Venue</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="citation : ${citations}">
                                    <td>
                                        <a th:href="@{/admin/scholardex/publications/citations(id=${citation.id})}" th:text="${citation.title}">Publication Title</a>
                                    </td>
                                    <td th:text="${citation.coverDate}">Year Published</td>
<!--                                    <td></td>-->
                                    <td th:if="${forumMap[citation.forum] != null}" th:text="${forumMap[citation.forum].publicationName}">Venue</td>
<!--                                    </td>-->
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <div th:replace="~{fragments :: app-footer}"></div>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

<script>
    function triggerScrape() {
        var userId = document.getElementsByName('researcherId')[0].value; // Get the userId from hidden input
        $.post('/api/scrape/papers', { researcherId: userId }, function(data) {
            $('#scrape-result').text(data.message); // Display the response message
        }).fail(function() {
            $('#scrape-result').text('An error occurred while trying to start the scraping task.');
        });
    }

    function triggerScrapeCitations() {
        var userId = document.getElementsByName('researcherId')[0].value; // Get the userId from hidden input
        $.post('/api/scrape/citations', { researcherId: userId }, function(data) {
            $('#scrape-cit-result').text(data.message); // Display the response message
        }).fail(function() {
            $('#scrape-cit-result').text('An error occurred while trying to start the scraping task.');
        });
    }
</script>

</body>
</html>
