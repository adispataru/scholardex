<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Affiliations</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: admin-sidebar('scopus-affiliations')}"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments :: navbar}"></div>

            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Affiliations</h1>
                <p class="mb-4">This is a list of all affiliations currently managed by the system.</p>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Filters</h6>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="admin-affiliations-search">Search</label>
                                <input id="admin-affiliations-search" type="text" class="form-control" placeholder="Name, ID, city, country">
                            </div>
                            <div class="form-group col-md-2">
                                <label for="admin-affiliations-sort">Sort By</label>
                                <select id="admin-affiliations-sort" class="form-control">
                                    <option value="name">Name</option>
                                    <option value="afid">ID</option>
                                    <option value="city">City</option>
                                    <option value="country">Country</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="admin-affiliations-direction">Direction</label>
                                <select id="admin-affiliations-direction" class="form-control">
                                    <option value="asc">Ascending</option>
                                    <option value="desc">Descending</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="admin-affiliations-size">Page Size</label>
                                <select id="admin-affiliations-size" class="form-control">
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Detailed View of Affiliations</h6>
                        <span id="admin-affiliations-total-info" class="text-muted small"></span>
                    </div>
                    <div class="card-body">
                        <div id="admin-affiliations-loading" class="alert alert-info" role="status">Loading affiliations...</div>
                        <div id="admin-affiliations-error" class="alert alert-danger d-none" role="alert"></div>
                        <div id="admin-affiliations-empty" class="alert alert-warning d-none" role="status">No affiliations found for the current filter.</div>

                        <div class="table-responsive">
                            <table class="table table-bordered" id="admin-affiliations-table" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>ID</th>
                                    <th>City</th>
                                    <th>Country</th>
                                </tr>
                                </thead>
                                <tbody id="admin-affiliations-table-body"></tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button id="admin-affiliations-prev" class="btn btn-outline-primary btn-sm" type="button">Previous</button>
                            <span id="admin-affiliations-page-info" class="text-muted small"></span>
                            <button id="admin-affiliations-next" class="btn btn-outline-primary btn-sm" type="button">Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments :: app-footer}"></div>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<th:block th:replace="~{fragments :: core-scripts}"></th:block>
<script src="/js/admin-scopus-affiliations.js"></script>

</body>
</html>
