<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${report.title}">Individual Report</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: admin-sidebar('groups')}"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments :: navbar}"></div>
            <div class="container-fluid">
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-2 text-gray-800" th:text="${report.title}">Individual Report</h1>
                    <form th:action="@{/admin/groups/{gid}/reports/view/{id}/refresh(gid=${group.id},id=${report.id})}" method="post">
                        <button type="submit" class="btn btn-primary btn-sm">Refresh scores</button>
                    </form>
                </div>
                <p class="mb-4" th:text="${report.description}"></p>
                <p class="mb-2 text-muted small">
                    Last computed:
                    <span th:text="${runCreatedAt}">-</span>
                    |
                    Status:
                    <span th:text="${runStatus}">READY</span>
                </p>
                <div th:if="${runBuildErrors != null and !runBuildErrors.isEmpty()}" class="alert alert-warning">
                    <strong>Build notes:</strong>
                    <ul class="mb-0 mt-2">
                        <li th:each="err : ${runBuildErrors}" th:text="${err}">-</li>
                    </ul>
                </div>

                <div class="table-responsive mt-3">
                    <table class="table table-bordered">
                        <thead class="thead-light">
                        <tr>
                            <th>Name</th>
                            <th>Position</th>
                            <th th:each="crit, index : ${report.criteria}"
                                th:text="${crit.name != null && !#strings.isEmpty(#strings.trim(crit.name)) ? crit.name : 'Criterion ' + (index.index + 1)}">Criterion</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="researcher : ${researchers}" th:if="${researcherScores[researcher.id] != null}">
                            <td th:text="${researcher.name}">Researcher Name</td>
                            <td th:text="${researcher.position}">Researcher Name</td>
                            <td th:each="crit, stat : ${report.criteria}">
                                <span th:text="${#numbers.formatDecimal(researcherScores[researcher.id][stat.index], 1, 2)}">0</span>
                                <i th:if="${researcher.position != null
                                    && !researcher.position.toString().equals('OTHER')
                                    && criteriaThresholds[stat.index] != null
                                    && criteriaThresholds[stat.index][researcher.position.toString()] != null
                                    && researcherScores[researcher.id][stat.index] >= criteriaThresholds[stat.index][researcher.position.toString()]}"
                                   class="fa-solid fa-check text-success ml-1"></i>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
            <div th:replace="~{fragments :: app-footer}"></div>
        </div>
    </div>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

</body>
</html>
