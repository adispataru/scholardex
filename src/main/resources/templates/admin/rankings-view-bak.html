<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rankings</title>
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="/vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
    <style>
        .card-spacing {
            margin-bottom: 20px;
        }
    </style>
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('rankings')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Rankings</h1>
                <!--                <p class="mb-4">This page displays the rankings of journals.</p>-->

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${journal.name}"></h6>
                    </div>
                    <div class="card-body">
                        <p>
                            <span>Forum: </span>
                            <span th:text="${journal.name}">Name</span>
                        </p>
                        <p>
                            <span>ISSN: </span>
                            <span th:text="${journal.getIssn}">ISSN</span>
                        </p>
                        <p>
                            <span>eISSN: </span>
                            <span th:text="${journal.eIssn}">eISSN</span>
                        </p>
                    </div>
                </div>

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Detailed Ranks</h6>
                    </div>
                    <div class="card-body">
                        <!--                        <div class="container-fluid">-->
                        <div th:each="e : ${journal.webOfScienceCategoryIndex}">
                            <div class="col-xl-9 col-md-9 mb-9">
                                <div class="card border-left-primary shadow h-100 py-2 card-spacing">
                                    <div class="card-body">
                                        <h6 class="m-0 text-primary" th:text="${e.key}">Category</h6>
                                        <div class="table-responsive">
                                            <table class="table table-bordered">
                                                <thead>
                                                <tr>
                                                    <td>Score</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" th:text="${i}">2015</td>
                                                </tr>
                                                </thead>
                                                <tbody>
                                                <tr>
                                                    <td>Q AIS</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" >
                                                        <span th:if="${e.value.qAis.get(i) != null}" th:text="${e.value.qAis.get(i)}"></span>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>Q Position</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" >
                                                        <span th:if="${e.value.rankAis.get(i) != null}" th:text="${e.value.rankAis.get(i)}"></span>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>AIS</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" >
                                                        <span th:if="${e.value.ais.get(i) != null}" th:text="${#numbers.formatDecimal(e.value.ais.get(i), 1, 2)}"></span>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>RIS</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" >
                                                        <span th:if="${e.value.ris.get(i) != null}" th:text="${#numbers.formatDecimal(e.value.ris.get(i), 1, 2)}"></span>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>IF</td>
                                                    <td th:each=" i: ${#numbers.sequence(2015, 2022)}" >
                                                        <span th:if="${e.value.IF.get(i) != null}" th:text="${#numbers.formatDecimal(e.value.IF.get(i), 1, 2)}"></span>
                                                    </td>
                                                </tr>
                                                </tbody>

                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!--                        </div>-->
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/vendor/jquery-easing/jquery.easing.min.js"></script>
<script src="/js/sb-admin-2.min.js"></script>
<script src="/vendor/datatables/jquery.dataTables.min.js"></script>
<script src="/vendor/datatables/dataTables.bootstrap4.min.js"></script>
<script src="/js/demo/datatables-demo.js"></script>

</body>
</html>
