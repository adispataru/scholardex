<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scholardex Authors</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: sidebar('scholardex-authors')}"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments :: navbar('Scholardex Authors')}"></div>

            <div class="container-fluid">
                <p class="mb-4">This is a list of all authors currently managed by the system.</p>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Filters</h6>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="admin-authors-search">Search</label>
                                <input id="admin-authors-search" type="text" class="form-control" placeholder="Author name or ID">
                            </div>
                            <div class="form-group col-md-3">
                                <label for="admin-authors-sort">Sort By</label>
                                <select id="admin-authors-sort" class="form-control">
                                    <option value="name">Name</option>
                                    <option value="id">ID</option>
                                </select>
                            </div>
                            <div class="form-group col-md-3">
                                <label for="admin-authors-direction">Direction</label>
                                <select id="admin-authors-direction" class="form-control">
                                    <option value="asc">Ascending</option>
                                    <option value="desc">Descending</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="admin-authors-size">Page Size</label>
                                <select id="admin-authors-size" class="form-control">
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Detailed View of Authors</h6>
                        <span id="admin-authors-total-info" class="text-muted small"></span>
                    </div>
                    <div class="card-body">
                        <div id="admin-authors-loading" class="alert alert-info" role="status">Loading authors...</div>
                        <div id="admin-authors-error" class="alert alert-danger d-none" role="alert"></div>
                        <div id="admin-authors-empty" class="alert alert-warning d-none" role="status">No authors found for the current search.</div>

                        <div class="table-responsive">
                            <table class="table table-bordered" id="admin-authors-table" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Affiliations</th>
                                </tr>
                                </thead>
                                <tbody id="admin-authors-table-body"></tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button id="admin-authors-prev" class="btn btn-outline-primary btn-sm" type="button">Previous</button>
                            <span id="admin-authors-page-info" class="text-muted small"></span>
                            <button id="admin-authors-next" class="btn btn-outline-primary btn-sm" type="button">Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments :: app-footer}"></div>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<th:block th:replace="~{fragments :: core-scripts}"></th:block>
<script src="/js/admin-scholardex-authors.js"></script>

</body>
</html>
