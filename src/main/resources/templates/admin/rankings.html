<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rankings</title>
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="/vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('rankings')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Rankings</h1>
                <p class="mb-4">This page displays the rankings of journals.</p>
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Actions</h6>
                    </div>
                    <div class="card-body" >
                        <div class="d-sm-flex align-items-center justify-content-between mb-4">
                            <h3 class="h3 mb-0 text-gray-800">Compute positions for known quarters</h3>
                            <form th:action="@{/admin/rankings/wos/computePositionsForKnownQuarters}" method="post">
                                <button type="submit" class="btn btn-primary"> Go!</button>
                            </form>
                        </div>
                        <div class="d-sm-flex align-items-center justify-content-between mb-4">
                            <h3 class="h3 mb-0 text-gray-800">Compute quarters and positions where missing</h3>
                            <form th:action="@{/admin/rankings/wos/computeQuartersAndRankingsWhereMissing}" method="post">
                                <button type="submit" class="btn btn-primary">Go! </button>
                            </form>
                        </div>
                        <div class="d-sm-flex align-items-center justify-content-between mb-4">
                            <h3 class="h3 mb-0 text-gray-800">Merge duplicate rankings</h3>
                            <form th:action="@{/admin/rankings/wos/mergeDuplicateRankings}" method="post">
                                <button type="submit" class="btn btn-primary">Go! </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Journal Rankings</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Forum</th>
                                    <th>ISSN</th>
                                    <th>eISSN</th>
                                    <th>Alt. ISSNs</th>
<!--                                    <th>Web of Science Category-Index</th>-->
<!--                                    <th>AIS 2022 </th>-->
<!--                                    <th>RIS 2022 </th>-->
<!--                                    <th>IF 2022 </th>-->
<!--                                    <th>Q AIS 2022 </th>-->
<!--                                    <th>Position in Q</th>-->
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="journal : ${journals}">
<!--                                <tr th:each="e : ${journal.webOfScienceCategoryIndex}">-->
                                    <td>
                                        <a th:text="${journal.name}" th:href="@{/admin/rankings/wos/{id}(id=${journal.id})}"></a>
                                    </td>
                                    <td th:text="${journal.issn}">ISSN</td>
                                    <td th:text="${journal.eIssn}">eISSN</td>
                                    <td>
                                        <span th:each="altIssn : ${journal.alternativeIssns}" th:text="${altIssn}"></span>
                                    </td>
<!--                                    <td th:text="${e.key}">Web of Science Category-Index</td>-->
<!--                                    <td th:text="${#numbers.formatDecimal(e.value.ais[2022], 1, 2)}">AIS 2022</td>-->
<!--                                    <td th:text="${#numbers.formatDecimal(e.value.ris[2022], 1, 2)}">RIS 2022</td>-->
<!--                                    <td th:text="${#numbers.formatDecimal(e.value.IF[2022], 1, 2)}">IF 2022</td>-->
<!--                                    <td th:text="${e.value.qAis[2022]}">Q AIS 2022</td>-->
<!--                                    <td th:text="${e.value.rankAis[2022]}">Position</td>-->
<!--                                </tr>-->
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/vendor/jquery-easing/jquery.easing.min.js"></script>
<script src="/js/sb-admin-2.min.js"></script>
<script src="/vendor/datatables/jquery.dataTables.min.js"></script>
<script src="/vendor/datatables/dataTables.bootstrap4.min.js"></script>
<script src="/js/demo/datatables-demo.js"></script>

</body>
</html>
