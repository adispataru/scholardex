<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: sidebar('users')}"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="~{fragments :: navbar}"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Users</h1>
<!--                    <a href="#" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm"><i-->
<!--                            class="fa-solid fa-download fa-sm text-white-50"></i> Generate Report</a>-->
                    <button type="button" class="btn btn-primary d-sm-inline-block" data-toggle="modal" data-target="#createUserModal">
                        New User
                    </button>

                    <!-- Create User Modal -->
                    <div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="createUserModalLabel">New User</h5>
                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                                <form th:action="@{/admin/users/create}" method="post">
                                    <div class="modal-body">
                                        <!-- Email Input -->
                                        <div class="form-group">
                                            <label for="user-email">Email</label>
                                            <input type="email" class="form-control" id="user-email" name="email" required>
                                        </div>
                                        <!-- Password Input -->
                                        <div class="form-group">
                                            <label for="user-password">Password</label>
                                            <input type="password" class="form-control" id="user-password" name="password" required>
                                        </div>
                                        <!-- Role Selection, adjust based on your Role entity -->
                                        <!-- Role Selection, adjusted for multiple selection -->
                                        <div class="form-group">
                                            <!--                                <label for="user-roles">Roles</label>-->
                                            <!--                                <select class="form-control" id="user-roles" name="roles" multiple>-->
                                            <!--                                    <option value="RESEARCHER">RESEARCHER</option>-->
                                            <!--                                    <option value="SUPERVISOR">SUPERVISOR</option>-->
                                            <!--                                    <option value="PLATFORM_ADMIN">PLATFORM_ADMIN</option>-->
                                            <!--                                </select>-->
                                            <!--                                <input type="hidden" name="email" th:value="${user.email}" />-->
                                            <div th:each="role, roleStat : ${allRoles}">
                                                <input type="checkbox" th:name="roles" th:value="${role}" />
                                                <label th:text="${role}"></label>
                                            </div>
                                        </div>

                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                                        <button type="submit" class="btn btn-primary">Create User</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">User Management</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered js-datatable" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Email</th>
                                    <th>Roles</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.email}"></td>
                                    <td>
                                        <form th:action="@{/admin/users/updateRoles}" method="post">
                                            <input type="hidden" name="email" th:value="${user.email}" />
                                            <div th:each="role, roleStat : ${allRoles}">
                                                <input type="checkbox" th:name="roles" th:value="${role}"
                                                       th:checked="${#lists.contains(user.roles, role)}" />
                                                <label th:text="${role}"></label>
                                            </div>
                                            <button type="submit" class="btn btn-info btn-sm">Update Roles</button>
                                        </form>
                                    </td>
                                    <td>
                                        <form th:action="@{/admin/users/lock/{email}(email=${user.email})}" method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-warning btn-sm">Lock</button>
                                        </form>
                                        <form th:action="@{/admin/users/delete/{email}(email=${user.email})}" method="post" style="display:inline;">
                                            <input type="hidden" name="_method" value="delete" />
                                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <div th:replace="~{fragments :: app-footer}"></div>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

</body>
</html>
