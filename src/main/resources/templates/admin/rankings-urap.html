<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>URAP Rankings</title>
    <th:block th:replace="fragments :: core-styles"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('rankings-urap')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">URAP University Rankings</h1>
                <p class="mb-4">This page displays the rankings of universities based on URAP.</p>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">University Rankings</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered js-datatable" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>University</th>
                                    <th>Country</th>
                                    <th>Article</th>
                                    <th>Citation</th>
                                    <th>Total Document</th>
                                    <th>AIT</th>
                                    <th>CIT</th>
                                    <th>Collaboration</th>
                                    <th>Total Score</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="ranking : ${rankings}">
                                    <td th:text="${ranking.scores?.get(2024)?.rank}">1</td>
                                    <td>
                                        <a th:text="${ranking.name}" th:href="@{/admin/rankings/urap/{id}(id=${ranking.name})}"></a>
                                    </td>
                                    <td th:text="${ranking.country}">Country</td>
                                    <td th:text="${ranking.scores?.get(2024)?.article}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.citation}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.totalDocument}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.AIT}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.CIT}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.collaboration}">0.0</td>
                                    <td th:text="${ranking.scores?.get(2024)?.total}">0.0</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>
<th:block th:replace="fragments :: core-scripts"></th:block>

<script src="/js/demo/datatables-demo.js"></script>

</body>
</html>
