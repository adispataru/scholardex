<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${journal.name}">Title</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .card-spacing {
            margin-bottom: 20px;
        }
        .heatmap-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: #5a5c69;
        }
        .heatmap-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .heatmap-legend-swatch {
            width: 14px;
            height: 14px;
            border: 1px solid #d1d3e2;
            border-radius: 2px;
        }
        .gh-heatmap-wrap {
            overflow-x: auto;
        }
        .gh-heatmap {
            min-width: fit-content;
        }
        .gh-heatmap-row {
            display: grid;
            grid-auto-rows: 16px;
            column-gap: 4px;
            row-gap: 0;
            margin-bottom: 6px;
            align-items: center;
        }
        .gh-label {
            font-size: 0.72rem;
            color: #5a5c69;
            font-weight: 700;
            text-align: left;
            white-space: nowrap;
            padding-right: 6px;
        }
        .gh-year {
            font-size: 0.62rem;
            color: #858796;
            text-align: center;
            line-height: 1;
        }
        .gh-cell {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            border: 1px solid #d1d3e2;
            cursor: default;
        }
        .gh-q1 { background: #d9534f; }
        .gh-q2 { background: #f6c23e; }
        .gh-q3 { background: #ffffff; }
        .gh-q4 { background: #b8bcc2; }
        .gh-empty { background: #6c757d; }
    </style>
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: admin-sidebar('rankings')}"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="~{fragments :: navbar}"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Rankings</h1>
                <!--                <p class="mb-4">This page displays the rankings of journals.</p>-->

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${journal.name}"></h6>
                    </div>
                    <div class="card-body">
                        <p>
                            <span>Forum: </span>
                            <span th:text="${journal.name}">Name</span>
                        </p>
                        <p>
                            <span>ISSN: </span>
                            <span th:text="${journal.getIssn}">ISSN</span>
                        </p>
                        <p>
                            <span>eISSN: </span>
                            <span th:text="${journal.eIssn}">eISSN</span>
                        </p>
                        <p>
                            <span>Alternative names: </span>
                            <span th:if="${journal.alternativeNames == null || journal.alternativeNames.isEmpty()}">—</span>
                            <span th:if="${journal.alternativeNames != null && !journal.alternativeNames.isEmpty()}"
                                  th:text="${#strings.listJoin(journal.alternativeNames, ', ')}">Alt names</span>
                        </p>
                        <p>
                            <span>Alternative ISSNs: </span>
                            <span th:if="${journal.alternativeIssns == null || journal.alternativeIssns.isEmpty()}">—</span>
                            <span th:if="${journal.alternativeIssns != null && !journal.alternativeIssns.isEmpty()}"
                                  th:text="${#strings.listJoin(journal.alternativeIssns, ', ')}">Alt ISSNs</span>
                        </p>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xl-12 col-md-12 mb-12">
                        <div class="card shadow py-2 card-spacing">
                            <div class="card-body">
                                <h6 class="m-0 text-primary">General Metrics</h6>
                                <div class="chart-area">
                                    <div id="chart-score"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-12 col-md-12 mb-12">
                        <div class="card shadow py-2 card-spacing">
                            <div class="card-body">
                                <h6 class="m-0 text-primary mb-3">Category Rankings</h6>
                                <div class="heatmap-legend">
                                    <span class="heatmap-legend-item"><span class="heatmap-legend-swatch" style="background:#d9534f"></span>Q1</span>
                                    <span class="heatmap-legend-item"><span class="heatmap-legend-swatch" style="background:#f6c23e"></span>Q2</span>
                                    <span class="heatmap-legend-item"><span class="heatmap-legend-swatch" style="background:#ffffff"></span>Q3</span>
                                    <span class="heatmap-legend-item"><span class="heatmap-legend-swatch" style="background:#b8bcc2"></span>Q4</span>
                                    <span class="heatmap-legend-item"><span class="heatmap-legend-swatch" style="background:#6c757d"></span>No data</span>
                                </div>
                                <div th:each="e, iterStat : ${journal.webOfScienceCategoryIndex}" class="mb-4">
                                    <h6 class="m-0 text-primary" th:text="${e.key}">Category</h6>
                                    <div class="mt-2">
                                        <div th:attr="id='chart-quartile-' + ${#strings.replace(e.key, ' ', '-')}"></div>
                                    </div>
                                    <hr th:if="${!iterStat.last}" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments :: app-footer}"></div>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<script src="/js/demo/datatables-demo.js"></script>
<script src="https://unpkg.com/frappe-charts@1.6.2/dist/frappe-charts.min.umd.js"></script>
<script th:inline="javascript">
    // Get the data from the server-side model
    var categoryData = /*[[${journal.webOfScienceCategoryIndex}]]*/ '{}';
    var score = /*[[${journal.score}]]*/ '{}';

    function collectYearKeys(container, yearSet) {
        if (!container || typeof container !== 'object') {
            return;
        }
        Object.keys(container).forEach(function (key) {
            if (/^\d{4}$/.test(key)) {
                yearSet.add(Number(key));
            }
        });
    }

    var yearSet = new Set();
    collectYearKeys(score.ais, yearSet);
    collectYearKeys(score.ris, yearSet);
    collectYearKeys(score.if, yearSet);

    Object.keys(categoryData || {}).forEach(function (categoryKey) {
        var category = categoryData[categoryKey] || {};
        collectYearKeys(category.qAis, yearSet);
        collectYearKeys(category.rankAis, yearSet);
        collectYearKeys(category.qRis, yearSet);
        collectYearKeys(category.rankRis, yearSet);
        collectYearKeys(category.qif, yearSet);
        collectYearKeys(category.qIF, yearSet);
        collectYearKeys(category.rankIf, yearSet);
        collectYearKeys(category.rankIF, yearSet);
    });

    var years = Array.from(yearSet).sort(function (a, b) { return a - b; });
    var hasFrappe = window.frappe && window.frappe.Chart;

    if (hasFrappe && years.length > 0) {
        new frappe.Chart('#chart-score', {
            title: 'AIS / RIS / IF',
            type: 'line',
            height: 280,
            colors: ['#1cc88a', '#f6c23e', '#e74a3b'],
            data: {
                labels: years,
                datasets: [{
                    label: 'AIS',
                    values: years.map(function (year) { return score.ais && score.ais[year] != null ? score.ais[year] : null; })
                }, {
                    label: 'RIS',
                    values: years.map(function (year) { return score.ris && score.ris[year] != null ? score.ris[year] : null; })
                }, {
                    label: 'IF',
                    values: years.map(function (year) { return score.if && score.if[year] != null ? score.if[year] : null; })
                }]
            },
            options: {
                lineOptions: { regionFill: 1 },
                axisOptions: { xAxisMode: 'tick', yAxisMode: 'span', xIsSeries: true }
            }
        });
    }

    function getField(entry, keys) {
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            if (entry && entry[key] != null) {
                return entry[key];
            }
        }
        return {};
    }

    function quarterNumber(rawQuarter) {
        if (rawQuarter == null) {
            return null;
        }
        if (Array.isArray(rawQuarter) && rawQuarter.length > 0) {
            rawQuarter = rawQuarter[0];
        }
        if (typeof rawQuarter === 'number' && rawQuarter >= 1 && rawQuarter <= 4) {
            return rawQuarter;
        }
        var normalized = String(rawQuarter).trim().toUpperCase();
        var match = normalized.match(/^Q?([1-4])$/);
        return match ? Number(match[1]) : null;
    }

    function metricCellLabel(quarter, rank) {
        if (quarter == null && rank == null) {
            return '—';
        }
        if (quarter != null && rank != null) {
            return 'Q' + quarter + ' #' + rank;
        }
        if (quarter != null) {
            return 'Q' + quarter;
        }
        return '#' + rank;
    }

    function quarterCssClass(quarter) {
        if (quarter === 1) return 'gh-q1';
        if (quarter === 2) return 'gh-q2';
        if (quarter === 3) return 'gh-q3';
        if (quarter === 4) return 'gh-q4';
        return 'gh-empty';
    }

    function renderCategoryHeatmap(container, categoryName, entry, years) {
        if (!container) {
            return;
        }

        var metricDefs = [
            {
                label: 'AIS',
                quarterMap: getField(entry, ['qais', 'qAis']),
                rankMap: getField(entry, ['rankAis', 'rankAIS']),
                quartileRankMap: getField(entry, ['quartileRankAis', 'quartileRankAIS'])
            },
            {
                label: 'RIS',
                quarterMap: getField(entry, ['qris', 'qRis']),
                rankMap: getField(entry, ['rankRis', 'rankRIS']),
                quartileRankMap: getField(entry, ['quartileRankRis', 'quartileRankRIS'])
            },
            {
                label: 'IF',
                quarterMap: getField(entry, ['qif', 'qIF']),
                rankMap: getField(entry, ['rankIf', 'rankIF']),
                quartileRankMap: getField(entry, ['quartileRankIf', 'quartileRankIF'])
            }
        ];

        var columnTemplate = '80px ' + years.map(function () { return '14px'; }).join(' ');
        var headerRow = '<div class="gh-heatmap-row" style="grid-template-columns:' + columnTemplate + ';">'
                + '<div class="gh-label"></div>'
                + years.map(function (year) {
                    return '<div class="gh-year" title="' + year + '">' + String(year).slice(-2) + '</div>';
                }).join('')
                + '</div>';

        var rowsHtml = metricDefs.map(function (metric) {
            var rowCells = years.map(function (year) {
                var quarter = quarterNumber(metric.quarterMap[year]);
                var rank = metric.rankMap[year];
                var quartileRank = metric.quartileRankMap[year];
                var title = metricCellLabel(quarter, rank);
                if (quartileRank != null) {
                    title += ' (quartile rank: #' + quartileRank + ')';
                }
                return '<div class="gh-cell ' + quarterCssClass(quarter) + '" title="' + title + '"></div>';
            }).join('');
            return '<div class="gh-heatmap-row" style="grid-template-columns:' + columnTemplate + ';">'
                    + '<div class="gh-label">' + metric.label + '</div>' + rowCells + '</div>';
        }).join('');

        container.innerHTML = '<div class="gh-heatmap-wrap"><div class="gh-heatmap">' + headerRow + rowsHtml + '</div></div>';
    }

    Object.keys(categoryData || {}).forEach(function (key) {
        var container = document.getElementById('chart-quartile-' + key.replace(/ /g, '-'));
        renderCategoryHeatmap(container, key, categoryData[key] || {}, years);
    });
</script>



</body>
</html>
