<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${journal.name}">Title</title>
    <link href="/assets/app.css" rel="stylesheet" type="text/css">
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .card-spacing {
            margin-bottom: 20px;
        }
    </style>
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('rankings')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Rankings</h1>
                <!--                <p class="mb-4">This page displays the rankings of journals.</p>-->

                <div class="card shadow mb-4 card-spacing">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${journal.name}"></h6>
                    </div>
                    <div class="card-body">
                        <p>
                            <span>Forum: </span>
                            <span th:text="${journal.name}">Name</span>
                        </p>
                        <p>
                            <span>ISSN: </span>
                            <span th:text="${journal.getIssn}">ISSN</span>
                        </p>
                        <p>
                            <span>eISSN: </span>
                            <span th:text="${journal.eIssn}">eISSN</span>
                        </p>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xl-12 col-md-12 mb-12">
                        <div class="card shadow py-2 card-spacing">
                            <div class="card-body">
                                <h6 class="m-0 text-primary">General Metrics</h6>
                                <div class="chart-area">
                                    <canvas id="chart-score"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-12 col-md-12 mb-12">
                        <div th:each="e, iterStat : ${journal.webOfScienceCategoryIndex}" class="col-xl-6 col-md-6 mb-6">
                                <div class="card shadow py-2">
                                    <div class="card-body">
                                        <h6 class="m-0 text-primary" th:text="${e.key}">Category</h6>
                                        <div class="chart-area">
                                            <canvas th:attr="id='chart-quartile-' + ${#strings.replace(e.key, ' ', '-')}"></canvas>
                                        </div>
                                    </div>
                                </div>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<script src="/assets/app.js"></script>
<script src="/js/sb-admin-2.min.js"></script>
<script src="/js/demo/datatables-demo.js"></script>
<script th:inline="javascript">
    // Function to format numbers
    function number_format(number, decimals, dec_point, thousands_sep) {
        number = (number + '').replace(',', '').replace(' ', '');
        var n = !isFinite(+number) ? 0 : +number,
            prec = !isFinite(+decimals) ? 0 : Math.abs(decimals),
            sep = (typeof thousands_sep === 'undefined') ? ',' : thousands_sep,
            dec = (typeof dec_point === 'undefined') ? '.' : dec_point,
            s = '',
            toFixedFix = function(n, prec) {
                var k = Math.pow(10, prec);
                return '' + Math.round(n * k) / k;
            };
        s = (prec ? toFixedFix(n, prec) : '' + Math.round(n)).split('.');
        if (s[0].length > 3) {
            s[0] = s[0].replace(/\B(?=(?:\d{3})+(?!\d))/g, sep);
        }
        if ((s[1] || '').length < prec) {
            s[1] = s[1] || '';
            s[1] += new Array(prec - s[1].length + 1).join('0');
        }
        return s.join(dec);
    }

    // Define the years to iterate through


    // Get the data from the server-side model
    var categoryData = /*[[${journal.webOfScienceCategoryIndex}]]*/ '{}';
    var score = /*[[${journal.score}]]*/ '{}';
    //years should span the range of the score.ais map

    var years = [];
    var min = 3000, max = 0;
    for(var key in score.ais) {
        if (key < min) {
            min = key;
        }
        if(key > max){
            max = key;
        }
    }
    for(var i = min; i <= max; i++){
        years.push(i);
    }
    var scoreChart = document.getElementById('chart-score');
    if(scoreChart != null) {
        var ctx = scoreChart.getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: [{
                    label: 'AIS',
                    data: years.map(year => score.ais[year] != null ? score.ais[year] : 0),
                    backgroundColor: "rgba(28, 200, 138, 0.05)",
                    borderColor: "rgba(28, 200, 138, 1)",
                    pointRadius: 3,
                    pointBackgroundColor: "rgba(28, 200, 138, 1)",
                    pointBorderColor: "rgba(28, 200, 138, 1)",
                    pointHoverRadius: 3,
                    pointHoverBackgroundColor: "rgba(28, 200, 138, 1)",
                    pointHoverBorderColor: "rgba(28, 200, 138, 1)",
                    pointHitRadius: 10,
                    pointBorderWidth: 2
                }, {
                    label: 'RIS',
                    data: years.map(year => score.ris[year] != null ? score.ris[year] : 0),
                    backgroundColor: "rgba(246, 194, 62, 0.05)",
                    borderColor: "rgba(246, 194, 62, 1)",
                    pointRadius: 3,
                    pointBackgroundColor: "rgba(246, 194, 62, 1)",
                    pointBorderColor: "rgba(246, 194, 62, 1)",
                    pointHoverRadius: 3,
                    pointHoverBackgroundColor: "rgba(246, 194, 62, 1)",
                    pointHoverBorderColor: "rgba(246, 194, 62, 1)",
                    pointHitRadius: 10,
                    pointBorderWidth: 2
                }, {
                    label: 'IF',
                    data: years.map(year => score.if[year] != null ? score.if[year] : 0),
                    backgroundColor: "rgba(231, 74, 59, 0.05)",
                    borderColor: "rgba(231, 74, 59, 1)",
                    pointRadius: 3,
                    pointBackgroundColor: "rgba(231, 74, 59, 1)",
                    pointBorderColor: "rgba(231, 74, 59, 1)",
                    pointHoverRadius: 3,
                    pointHoverBackgroundColor: "rgba(231, 74, 59, 1)",
                    pointHoverBorderColor: "rgba(231, 74, 59, 1)",
                    pointHitRadius: 10,
                    pointBorderWidth: 2
                }]
            },
            options: {
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        left: 10,
                        right: 25,
                        top: 25,
                        bottom: 0
                    }
                },
                scales: {
                    xAxes: [{
                        time: {
                            unit: 'year'
                        },
                        gridLines: {
                            display: false,
                            drawBorder: false
                        },
                        ticks: {
                            maxTicksLimit: 8
                        }
                    }],
                    yAxes: [{
                        ticks: {
                            maxTicksLimit: 5,
                            padding: 10
                        },
                        gridLines: {
                            color: "rgb(234, 236, 244)",
                            zeroLineColor: "rgb(234, 236, 244)",
                            drawBorder: false,
                            borderDash: [2],
                            zeroLineBorderDash: [2]
                        }
                    }]
                },
                legend: {
                    display: true
                },
                tooltips: {
                    backgroundColor: "rgb(255,255,255)",
                    bodyFontColor: "#858796",
                    titleMarginBottom: 10,
                    titleFontColor: '#6e707e',
                    titleFontSize: 14,
                    borderColor: '#dddfeb',
                    borderWidth: 1,
                    xPadding: 15,
                    yPadding: 15,
                    displayColors: false,
                    intersect: false,
                    mode: 'index',
                    caretPadding: 10,
                    callbacks: {
                        label: function (tooltipItem, chart) {
                            var datasetLabel = chart.datasets[tooltipItem.datasetIndex].label || '';
                            return datasetLabel + ': ' + number_format(tooltipItem.yLabel, 2);
                        }
                    }
                }
            }
        });
    }

    // Chart.js configuration
    Object.keys(categoryData).forEach(function(key) {
        var quartCtx = document.getElementById('chart-quartile-' + key.replace(/ /g, '-')).getContext('2d');
        var entry = categoryData[key];


        new Chart(quartCtx, {
            type: 'bar',
            data: {
                labels: years,
                datasets: [
                        {
                        label: 'Q AIS',
                        data: years.map(year => entry.qais[year] != null ? entry.qais[year][1] : 0),
                            backgroundColor: "#4e73df",
                            hoverBackgroundColor: "#2e59d9",
                            borderColor: "#4e73df",
                    },
                        {
                        label: 'Q AIS Position',
                        data: years.map(year => entry.rankAis[year] != null ? entry.rankAis[year] : 0),
                        backgroundColor: "rgba(54, 185, 204)",
                        hoverBackgroundColor: "rgba(24, 125, 165)",
                        borderColor: "rgba(54, 185, 204, 1)",
                    },
                    {
                        label: 'Q IF',
                        data: years.map(year => entry.qif[year] != null ? entry.qif[year][1] : 0),
                        backgroundColor: "#df4e4e",
                        hoverBackgroundColor: "#d92e2e",
                        borderColor: "#df4e69",
                    },
                    {
                        label: 'Q IF Position',
                        data: years.map(year => entry.rankIF[year] != null ? entry.rankIF[year] : 0),
                        backgroundColor: "rgb(204,54,129)",
                        hoverBackgroundColor: "rgb(181,49,115)",
                        borderColor: "rgb(204,54,129)",
                    }]
            },
            options: {
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        left: 10,
                        right: 25,
                        top: 25,
                        bottom: 0
                    }
                },
                scales: {
                    xAxes: [{
                        time: {
                            unit: 'year'
                        },
                        gridLines: {
                            display: false,
                            drawBorder: false
                        },
                        ticks: {
                            maxTicksLimit: 8
                        }
                    }],
                    yAxes: [{
                        ticks: {
                            maxTicksLimit: 5,
                            padding: 10
                        },
                        gridLines: {
                            color: "rgb(234, 236, 244)",
                            zeroLineColor: "rgb(234, 236, 244)",
                            drawBorder: false,
                            borderDash: [2],
                            zeroLineBorderDash: [2]
                        }
                    }]
                },
                legend: {
                    display: true
                },
                tooltips: {
                    backgroundColor: "rgb(255,255,255)",
                    bodyFontColor: "#858796",
                    titleMarginBottom: 10,
                    titleFontColor: '#6e707e',
                    titleFontSize: 14,
                    borderColor: '#dddfeb',
                    borderWidth: 1,
                    xPadding: 15,
                    yPadding: 15,
                    displayColors: false,
                    intersect: false,
                    mode: 'index',
                    caretPadding: 10,
                    callbacks: {
                        label: function(tooltipItem, chart) {
                            var datasetLabel = chart.datasets[tooltipItem.datasetIndex].label || '';
                            return datasetLabel + ': ' + number_format(tooltipItem.yLabel, 2);
                        }
                    }
                }
            }
        });
    });
</script>



</body>
</html>
