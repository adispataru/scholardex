<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publications</title>
    <th:block th:replace="fragments :: core-styles"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('groups')"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="fragments :: navbar"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800" th:text="${group.name}">Publications</h1>
                    <a th:href="@{/admin/groups/{id}/publications/exportCNFIS2025(id=${group.id})}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-download fa-sm text-white-50"></i> Export CNFIS
                    </a>
                    <a th:href="@{/admin/groups/{id}/publications/exportAllReports(id=${group.id})}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-download fa-sm text-white-50"></i> Export CNFIS zip
                    </a>
                    <a th:href="@{/admin/groups/{id}/publications/export(id=${group.id})}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fas fa-download fa-sm text-white-50"></i> Export CSV
                    </a>

                </div>
                <div class="row">
                    <div class="col-xl-9 col-md-12 mb-4">
                        <div class="card border-left-primary shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class=" font-weight-bold text-primary text-uppercase mb-1" th:text="${publications.size()}">
                                            nb</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" >Publications</div>
                                    </div>

                                    <canvas id="chart-publications"></canvas>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-12 mb-4">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">Individual Reports</h6>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                        <thead>
                                        <tr>
                                            <th>Title</th>
                                            <th>Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="report : ${individualReports}">
                                            <td th:text="${report.title}">Report Title</td>
                                            <td>
                                                <a th:href="@{/admin/groups/{gid}/reports/view/{id}(gid=${group.id},id=${report.id})}" class="btn btn-primary btn-sm">Apply</a>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
<!--                    &lt;!&ndash; Earnings (Monthly) Card Example &ndash;&gt;-->
<!--                    <div class="col-xl-3 col-md-6 mb-4">-->
<!--                        <div class="card border-left-primary shadow h-100 py-2">-->
<!--                            <div class="card-body">-->
<!--                                <div class="row no-gutters align-items-center">-->
<!--                                    <div class="col mr-2">-->
<!--                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">-->
<!--                                            h-Index </div>-->
<!--                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${hIndex}"></div>-->
<!--                                    </div>-->
<!--                                    <div class="col-auto">-->
<!--                                        <i class="fas fa-hashtag fa-2x text-primary"></i>-->
<!--                                    </div>-->
<!--                                </div>-->
<!--                            </div>-->
<!--                        </div>-->
<!--                    </div>-->

                </div>


                <!-- DataTales Example -->
                <div class="card shadow mb-4" th:each="entry : ${publicationsByYear}">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${entry.key}">Year</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Year</th>
                                    <th>Authors</th>
                                    <th>Type</th>
                                    <th>Venue</th>
                                    <th>Citations</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="publication : ${entry.value}">
                                    <td>
                                        <a th:href="@{/user/publications/citations(id=${publication.id})}" th:text="${publication.title}">Publication Title</a>
                                    </td>
                                    <td th:text="${publication.coverDate}">Year Published</td>
                                    <td>
                                        <div th:each="author, iterStat : ${publication.authors}">

                                            <a th:if="${authorMap[publication.authors[iterStat.index]] != null}" th:text="${authorMap[publication.authors[iterStat.index]].name} + (iterStat.last ? '; ' : '')" th:href="@{/user/authors/view/{id}(id=${author})}">
                                                <span>;</span>
                                            </a>
                                            <span th:if="${authorMap[publication.authors[iterStat.index]] == null}" th:text="${author}"></span>
                                        </div>
<!--                                        <span th:each="author, iterStat : ${publication.authors}" th:text="${authorMap[author].name} + (iterStat.last ? '; ' : '')"></span>-->
                                    </td>
                                    <td th:text="${publication.subtypeDescription}">0</td>
                                    <td>
                                        <p th:if="${forumMap[publication.forum] != null}" th:text="${forumMap[publication.forum].publicationName}">

                                        </p>
                                    </td>

                                    <td th:text="${publication.citedbyCount}">0</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="fragments :: core-scripts"></th:block>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>
<script th:inline="javascript">
    var countData = /*[[${publicationsCountByYear}]]*/ '{}';
    var years = Object.keys(countData);
    var counts = years.map(y => countData[y]);

    var ctx = document.getElementById('chart-publications').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: years,
            datasets: [{
                label: 'Publications',
                data: counts,
                backgroundColor: 'rgba(78, 115, 223, 0.5)',
                borderColor: 'rgba(78, 115, 223, 1)',
                borderWidth: 1
            }]
        },
        options: {
            aspectRatio: 3,
            scales: {
                xAxes: [{ gridLines: { display: false } }],
                yAxes: [{ ticks: { beginAtZero: true, stepSize: 1 } }]
            },
            legend: { display: false }
        }
    });
</script>


</body>
</html>
