<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rankings</title>
    <th:block th:replace="fragments :: core-styles"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: admin-sidebar('rankings-core')"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <div th:replace="fragments :: navbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-2 text-gray-800">Core Rankings</h1>
                <p class="mb-4">This page displays the rankings of conferences.</p>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Conference Rankings</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered js-datatable" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Conference</th>
                                    <th>Acronym</th>
                                    <th>Category 2023</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="conf : ${confs}">
<!--                                <tr th:each="e : ${conf.webOfScienceCategoryIndex}">-->
                                    <td>
                                        <a th:text="${conf.name}" th:href="@{/admin/rankings/core/{id}(id=${conf.id})}"></a>
                                    </td>
                                    <td th:text="${conf.acronym}">acr</td>
                                    <td>
                                        <span th:if="${conf.yearlyRankings.get(2023) != null}" th:text="${conf.yearlyRankings.get(2023).rank}"></span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>
<th:block th:replace="fragments :: core-scripts"></th:block>

<script src="/js/demo/datatables-demo.js"></script>

</body>
</html>
