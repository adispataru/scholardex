<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publications</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"/>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>

    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: user-sidebar('publications')}"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="~{fragments :: navbar}"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">Select Authors</h1>
                <div class="card shadow">
                    <div class="card-body">
                        <form th:action="@{/user/publications/add/step2}" method="post">
                            <div class="form-group">
                                <input type="hidden" name="forumId" th:value="${forumId}"/>
                            </div>
                            <div class="form-group">
                                <label for="author-search">Author</label>
                                <input id="author-search" class="form-control" placeholder="Search author…"/>
                                <input type="hidden" name="authorIds" id="author-ids"/>
                            </div>
                            <button type="button" class="btn btn-secondary" id="add-author-btn">Add Author</button>
                            <ul class="list-group mt-3" id="selected-authors"></ul>
                            <button type="submit" class="btn btn-primary mt-4">Next</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <div th:replace="~{fragments :: app-footer}"></div>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

<script>

</script>

</body>
</html>
