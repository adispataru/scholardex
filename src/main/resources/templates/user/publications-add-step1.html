<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publications</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"/>
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">

    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="/vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="fragments :: user-sidebar('publications')"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="fragments :: navbar"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">Select Forum</h1>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Select Forum</h6>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/user/publications/add/step1}" method="post">
                            <div class="form-group">
                                <label for="forum-search">Forum</label>
                                <input id="forum-search" class="form-control" placeholder="Search forum…"/>
                                <input type="hidden" name="selectedForumId" id="forum-id"/>
                            </div>
                            <hr>
                            <p>
                                <a class="btn btn-link" data-toggle="collapse" href="#createForumSection"
                                   role="button" aria-expanded="false" aria-controls="createForumSection">
                                    Or create new
                                </a>
                            </p>
                            <div class="collapse" id="createForumSection">
                                <h5>Create new:</h5>
                                <div class="form-group">
                                    <label>Name</label>
                                    <input type="text" th:field="*{newForum.publicationName}" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label>ISSN</label>
                                    <input type="text" th:field="*{newForum.issn}" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label>eISSN</label>
                                    <input type="text" th:field="*{newForum.eIssn}" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label>ISBN</label>
                                    <input type="text" th:field="*{newForum.isbn}" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label>Type</label>
                                    <select class="form-control" th:field="*{newForum.aggregationType}">
                                        <option value="Journal">Journal</option>
                                        <option value="Book">Book</option>
                                        <option value="Book Series">Book Series</option>
                                        <option value="Conference Proceeding">Conference Proceeding</option>
                                        <option value="Trade Journal">Trade Journal</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Publisher</label>
                                    <input type="text" th:field="*{newForum.publisher}" class="form-control"/>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Next</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; ScholarDex 2024</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- include jQuery UI CSS & JS after your other scripts -->

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script th:inline="javascript">

    $(document).ready(function() {
    /*<![CDATA[*/
    // load forums as JS objects [{id:'', name:''},…]
    var forums = /*[[${forums}]]*/ [];
    // var forums = ['Forum A', 'Forum B'];
    // map names → ids
    var forumMap = {};
    console.log(forums.length + " forums loaded");
    forums.forEach(function(f){ forumMap[f.publicationName] = f.id; });
    // initialize autocomplete
    $("#forum-search").autocomplete({
        source: Object.keys(forumMap),
        minLength: 2,
        select: function(event, ui) {
            $("#forum-id").val(forumMap[ui.item.value]);
        }
    });
    });
    /*]]>*/
</script>


<!-- Core plugin JavaScript-->
<script src="/vendor/jquery-easing/jquery.easing.min.js"></script>

<!-- Custom scripts for all pages-->
<script src="/js/sb-admin-2.min.js"></script>

<!-- Page level plugins -->
<script src="/vendor/datatables/jquery.dataTables.min.js"></script>
<script src="/vendor/datatables/dataTables.bootstrap4.min.js"></script>

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

<script>

</script>

</body>
</html>
