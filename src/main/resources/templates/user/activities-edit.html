<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Activity Instance</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: sidebar('activities')}"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="~{fragments :: navbar('Edit Activity Instance')}"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <p class="mb-4" th:text="${activityInstance.activity.name}"></p>

                <!-- Form for editing the activity instance -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Update Activity Instance</h6>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/user/activities/update}" th:object="${activityInstance}" method="post">
                            <div class="form-group">
                                <input type="text" class="form-control" id="instanceId" th:field="*{id}" hidden>
                            </div>
                            <div class="form-group">
<!--                                <label for="activityName">Activity</label>-->
                                <input type="text" class="form-control" id="activityName" th:value="${activityInstance.activity.name}" disabled>
                            </div>
                            <div class="form-group">
                                <input type="text" th:field="*{researcherId}" th:value="*{researcherId}" hidden>
                            </div>
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" th:field="*{name}" th:value="*{date}">
                            </div>
                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="text" id="date" th:field="*{date}" th:value="*{date}">
                            </div>
                            <div class="form-group">
                                <label for="activityFields">Fields</label>
                                <div id="fieldsContainer">
                                    <div class="card mb-2" th:each="field : ${activityInstance.fields}">
                                        <div class="card-body">
                                            <div class="form-group">
                                                <label th:text="${field.key}"></label>
                                                <input type="text" class="form-control" th:field="*{fields[__${field.key}__]}" th:value="${field.value}" required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="referenceFields">Reference Fields</label>
                                <div id="referenceFieldsContainer">
                                    <div class="card mb-2" th:each="refField : ${activityInstance.referenceFields}">
                                        <div class="card-body">
                                            <div class="form-group">
                                                <label th:text="${refField.key}"></label>
                                                <input type="text" class="form-control" th:field="*{referenceFields[__${refField.key}__]}" th:value="${refField.value}" required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Update</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <div th:replace="~{fragments :: app-footer}"></div>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<!-- Page level plugins -->

</body>
</html>
