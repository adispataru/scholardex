<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publications</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">

<div id="wrapper">
    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: user-sidebar('publications')}"></div>
        <!-- Sidebar Toggler (Sidebar) -->
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            <!-- Topbar -->
            <div th:replace="~{fragments :: navbar}"></div>

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <div>
                        <h1 class="h3 mb-0 text-gray-800" th:text="${publicationPageTitle ?: 'Publications'}">Publications</h1>
                        <p class="text-muted small mb-0" th:if="${publicationPageSubtitle != null}" th:text="${publicationPageSubtitle}">Author name</p>
                    </div>
                    <a th:if="${showPublicationActions == null || showPublicationActions}" th:href="@{/user/publications/exportCNFIS2025}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                        <i class="fa-solid fa-download fa-sm text-white-50"></i> Export CNFIS
                    </a>
                    <a th:if="${showPublicationActions == null || showPublicationActions}" th:href="@{/user/publications/add}" class="d-none d-sm-inline-block btn btn-sm btn-outline-success shadow-sm">
                        <i class="fa-solid fa-download fa-sm text-white-50"></i> Add Publication
                    </a>
                    <a th:if="${showPublicationActions == null || showPublicationActions}" th:href="@{/user/publications/scopus_tasks}" class="d-none d-sm-inline-block btn btn-sm btn-outline-success shadow-sm">
                        <i class="fa-solid fa-download fa-sm text-white-50"></i> Scopus Updates
                    </a>

                </div>
                <div class="row">
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-primary shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                            Number of publications </div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${publications.size()}"></div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fa-solid fa-layer-group fa-2x text-primary"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-primary shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                            Number of citations </div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${numCitations}"></div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fa-solid fa-link fa-2x text-primary"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Earnings (Monthly) Card Example -->
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card border-left-primary shadow h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                            h-Index </div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${hIndex}"></div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="fa-solid fa-hashtag fa-2x text-primary"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>


                <!-- DataTales Example -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary" th:text="${publicationTableTitle ?: 'Your Publications'}">Your Publications</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered js-datatable" id="dataTable" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Year</th>
                                    <th>Authors</th>
                                    <th>Type</th>
                                    <th>Venue</th>
                                    <th>Funding</th>
                                    <th>Citations</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="publication : ${publications}">
                                    <td>
                                        <a th:href="@{/user/publications/citations(id=${publication.id})}" th:text="${publication.title}">Publication Title</a>
                                    </td>
                                    <td th:text="${publication.coverDate}">Year Published</td>
                                    <td>
                                        <div th:each="author, iterStat : ${publication.authors}">

                                            <a th:if="${authorMap[publication.authors[iterStat.index]] != null}" th:text="${authorMap[publication.authors[iterStat.index]].name} + (iterStat.last ? '; ' : '')" th:href="@{/user/authors/view/{id}(id=${author})}">
                                                <span>;</span>
                                            </a>
                                            <span th:if="${authorMap[publication.authors[iterStat.index]] == null}" th:text="${author}"></span>
                                        </div>
<!--                                        <span th:each="author, iterStat : ${publication.authors}" th:text="${authorMap[author].name} + (iterStat.last ? '; ' : '')"></span>-->
                                    </td>
                                    <td th:text="${publication.subtypeDescription}">0</td>
                                    <div th:if="${forumMap[publication.forum] != null}">
                                        <td th:text="${forumMap[publication.forum].publicationName}">0</td>
                                    </div>
                                    <td th:text="${publication.fundingId}"></td>
                                    <td th:text="${publication.citedbyCount}">0</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <div th:replace="~{fragments :: app-footer}"></div>
            <!-- End of Footer -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fa-solid fa-angle-up"></i>
    </a>
</div>

<!-- Bootstrap core JavaScript-->
<th:block th:replace="~{fragments :: core-scripts}"></th:block>

<!-- Page level plugins -->

<!-- Page level custom scripts -->
<script src="/js/demo/datatables-demo.js"></script>

<script>

</script>

</body>
</html>
