<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${indicator.name}">Indicator</title>
    <th:block th:replace="~{fragments :: core-styles}"></th:block>
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="/css/indicator-citations-dashboard.css" rel="stylesheet">
</head>
<body id="page-top">
<div id="wrapper">
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
        <div th:replace="~{fragments :: user-sidebar('indicators')}"></div>
        <div class="text-center d-none d-md-inline">
            <button class="rounded-circle border-0" id="sidebarToggle"></button>
        </div>
    </ul>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments :: navbar}"></div>

            <div class="container-fluid" id="activities-dashboard-v2"
                 th:attr="data-quarter-labels=${#strings.listJoin(allQuarters, '|')},data-quarter-values=${#strings.listJoin(allValues, '|')}">
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800" th:text="${indicator.name}">Indicator scores</h1>
                    <div class="d-flex">
                        <a th:href="@{/user/indicators/export/{id}(id=${indicator.id})}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm mr-2">
                            <i class="fa-solid fa-download fa-sm text-white-50"></i> Export Excel
                        </a>
                        <form th:action="@{/user/indicators/apply/{id}/refresh(id=${indicator.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-primary shadow-sm">Refresh Scores</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow mb-3">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Indicator Overview</h6>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-lg-3 col-md-6 mb-3 mb-lg-0">
                                <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Score</div>
                                <div class="h4 mb-0 font-weight-bold text-gray-800" th:text="${total}">0</div>
                            </div>
                            <div class="col-lg-6 col-md-12">
                                <div class="chart-cell">
                                    <canvas id="activities-quarter-chart" aria-label="Quarter distribution"></canvas>
                                </div>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div>
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">Indicator Context</div>
                            <dl class="row mb-0 small">
                                <dt class="col-sm-3">Output Type</dt>
                                <dd class="col-sm-9" th:text="${indicator.outputType}"></dd>
                                <dt class="col-sm-3">Domain</dt>
                                <dd class="col-sm-9" th:text="${indicator.domain.name}"></dd>
                                <dt class="col-sm-3">Scoring Strategy</dt>
                                <dd class="col-sm-9" th:text="${indicator.scoringStrategy}"></dd>
                                <dt class="col-sm-3">Formula</dt>
                                <dd class="col-sm-9" th:text="${indicator.formula}"></dd>
                            </dl>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-3">
                    <div class="card-body">
                        <div class="form-row align-items-end">
                            <div class="col-md-4 mb-2">
                                <label for="activities-search" class="small text-muted">Search</label>
                                <input id="activities-search" class="form-control" type="search" placeholder="Name, type, details...">
                            </div>
                            <div class="col-md-2 mb-2">
                                <label for="activities-min-score" class="small text-muted">Min Author Score</label>
                                <input id="activities-min-score" class="form-control" type="number" min="0" step="0.01" value="0">
                            </div>
                            <div class="col-md-2 mb-2">
                                <label for="activities-quarter" class="small text-muted">Quarter</label>
                                <select id="activities-quarter" class="form-control">
                                    <option value="">All</option>
                                    <option th:each="q : ${allQuarters}" th:value="${q}" th:text="${q}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label for="activities-type" class="small text-muted">Type</label>
                                <select id="activities-type" class="form-control">
                                    <option value="">All</option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label for="activities-sort" class="small text-muted">Sort</label>
                                <select id="activities-sort" class="form-control">
                                    <option value="score_desc">Score desc</option>
                                    <option value="score_asc">Score asc</option>
                                    <option value="title_asc">Name A-Z</option>
                                    <option value="title_desc">Name Z-A</option>
                                    <option value="year_desc">Year desc</option>
                                    <option value="year_asc">Year asc</option>
                                </select>
                            </div>
                        </div>
                        <button id="activities-clear" type="button" class="btn btn-link btn-sm px-0">Clear filters</button>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Individual scores</h6>
                        <span id="activities-count" class="small text-muted"></span>
                    </div>
                    <div class="card-body">
                        <div id="activities-empty-state" class="alert alert-light d-none mb-3">No activities match current filters.</div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover" id="activities-main-table" width="100%" cellspacing="0">
                                <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Type</th>
                                    <th>Details</th>
                                    <th>Year</th>
                                    <th>Forum Score</th>
                                    <th>Author Score</th>
                                    <th>Extra Score</th>
                                </tr>
                                </thead>
                                <tbody id="activities-main-body">
                                <tr th:each="act : ${activities}"
                                    class="js-activity-row"
                                    th:attr="data-search=${(act.name ?: '') + ' ' + (act.activity != null ? act.activity.name : '') + ' ' + (scores[act.id] != null ? scores[act.id].details : '')},
                                             data-type=${act.activity != null ? act.activity.name : ''},
                                             data-quarter=${scores[act.id] != null ? scores[act.id].quarter : ''},
                                             data-author-score=${scores[act.id] != null ? scores[act.id].authorScore : 0},
                                             data-forum-score=${scores[act.id] != null ? scores[act.id].score : 0},
                                             data-year=${scores[act.id] != null ? scores[act.id].year : 0}">
                                    <td><span th:text="${act.name}">Title</span></td>
                                    <td th:text="${act.activity != null ? act.activity.name : ''}"></td>
                                    <td><span th:text="${scores[act.id] != null ? scores[act.id].details : ''}">0</span></td>
                                    <td><span th:text="${scores[act.id] != null ? scores[act.id].year : ''}">0</span></td>
                                    <td><span th:text="${scores[act.id] != null ? scores[act.id].score : ''}">0</span></td>
                                    <td><span th:text="${scores[act.id] != null ? #numbers.formatDecimal(scores[act.id].authorScore, 1, 2) : ''}">0</span></td>
                                    <td>
                                        <ul class="mb-0 pl-3" th:if="${scores[act.id] != null && scores[act.id].extra != null}">
                                            <li th:each="entry : ${scores[act.id].extra.entrySet()}" th:text="${entry.key + ': ' + entry.value}"></li>
                                        </ul>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments :: app-footer}"></div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments :: core-scripts}"></th:block>
<script src="/js/indicator-activities-dashboard.js"></script>
</body>
</html>
