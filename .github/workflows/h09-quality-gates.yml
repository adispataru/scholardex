name: H09 Quality Gates

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: h09-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Run guardrail suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-logs

          run_guardrail() {
            local script="$1"
            npm run "$script" 2>&1 | tee ".ci-logs/${script}.log"
          }

          run_guardrail verify-architecture-boundaries
          run_guardrail verify-h06-persistence
          run_guardrail verify-h07-guardrails
          run_guardrail verify-h08-baseline
          run_guardrail verify-h12-integrations
          run_guardrail verify-duplication-guardrails
          run_guardrail verify-wos-parity-baseline

      - name: Upload guardrail logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-logs
          path: .ci-logs/

  java-smoke:
    name: java-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: compileJava
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon compileJava

      - name: CoreApplicationTests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon test --tests "*CoreApplicationTests"

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-smoke-test-report
          path: build/reports/tests/test/

  quality-full:
    name: quality-full
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand({ ping: 1 })\" --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: verify-assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-logs
          npm run verify-assets 2>&1 | tee .ci-logs/verify-assets.log

      - name: verify-template-assets
        shell: bash
        run: |
          set -euo pipefail
          npm run verify-template-assets 2>&1 | tee .ci-logs/verify-template-assets.log

      - name: Wait for Mongo service
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if docker exec "${{ job.services.mongo.id }}" mongosh --eval "db.adminCommand({ ping: 1 })" --quiet >/dev/null 2>&1; then
              echo "Mongo is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Mongo service did not become ready in time" >&2
          exit 1

      - name: gradle-check
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon check 2>&1 | tee .ci-logs/gradle-check.log

      - name: Upload quality logs and test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-full-artifacts
          path: |
            .ci-logs/
            build/reports/tests/test/

  summary:
    name: summary
    runs-on: ubuntu-latest
    if: always()
    needs: [guardrails, java-smoke, quality-full]
    steps:
      - name: Publish rollout summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## H09 Quality Gates Summary"
            echo ""
            echo "- guardrails: ${{ needs.guardrails.result }}"
            echo "- java-smoke: ${{ needs.java-smoke.result }}"
            echo "- quality-full: ${{ needs.quality-full.result }}"
            echo ""
            echo "Stage 2 policy: required checks include guardrails, java-smoke, quality-full, dependency-review, and codeql-analysis."
          } >> "$GITHUB_STEP_SUMMARY"
